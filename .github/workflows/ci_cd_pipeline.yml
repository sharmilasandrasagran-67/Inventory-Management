name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate data
        run: python src/validate_data.py

      - name: Train demand model (baseline)
        run: python src/train_model.py

      - name: Train improved demand model
        run: python src/train_improved_model.py

      - name: Check demand model parameter file
        run: test -f model/model_params.json

      - name: Train inventory decision models
        run: python src/train_inventory_models.py

      - name: Check inventory models file
        run: test -f model/inventory_models.json

      - name: Run tests
        run: pytest tests/ -v

      - name: Check dashboards compile
        run: |
          python -m py_compile dashboard/dashboard.py
          python -m py_compile dashboard/inventory_dashboard.py
